<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SER+ | Início</title>
    
    <!-- Tailwind CSS via CDN (Framework leve e moderno) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fontes Premium (Inter para texto, Playfair para títulos) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Configuração de Cores e Fontes -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            purple: '#4c1d95',
                            dark: '#2e1065',
                            gold: '#b48c36',
                            goldLight: '#fde047'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Ajustes finos baseados na imagem */
        body { background-color: #4c1d95; }
        .glass-card {
            background: linear-gradient(145deg, #e5e7eb, #d1d5db);
        }
        .library-container {
            background: linear-gradient(to bottom, rgba(255,255,255,0.95), #ffffff);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans relative pb-20 text-gray-800">

    <!-- HEADER -->
    <header class="flex justify-between items-center p-6 pt-12">
        <div class="text-4xl font-serif italic text-white font-bold tracking-tighter">
            S<span class="text-brand-goldLight align-super text-2xl not-italic">+</span>
        </div>
        <button class="p-2 border-2 border-brand-goldLight rounded-xl">
            <!-- Ícone de Perfil -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fde047" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
    </header>

    <!-- BANNER DE LANÇAMENTO -->
    <div class="px-6 mb-6">
        <div class="glass-card rounded-3xl p-6 flex items-center justify-between shadow-xl relative overflow-hidden h-40">
            <div class="z-10 max-w-[65%]">
                <p class="text-gray-800 font-bold text-[11px] mb-1 tracking-wider">LANÇAMENTO:</p>
                <p class="text-gray-900 font-serif text-lg leading-tight mb-4">"A Chave do Amanhã"<br/>- Reserve já!</p>
                <button class="bg-gradient-to-r from-yellow-200 to-yellow-500 text-black text-xs font-bold px-6 py-2 rounded-full shadow-md">
                    COMPRAR
                </button>
            </div>
            <!-- Mockup da Chave Dourada -->
            <div class="absolute right-[-30px] top-1/2 -translate-y-1/2 w-48 h-48 opacity-90 mix-blend-multiply">
                <img src="https://images.unsplash.com/photo-1584844295874-916892520301?auto=format&fit=crop&w=300&q=80" alt="Chave" class="w-full h-full object-cover">
            </div>
        </div>
        
        <!-- Paginação (Pontinhos) -->
        <div class="flex justify-center gap-2 mt-4">
            <div class="w-6 h-1.5 bg-white rounded-full shadow-sm"></div>
            <div class="w-1.5 h-1.5 bg-white/30 rounded-full"></div>
            <div class="w-1.5 h-1.5 bg-white/30 rounded-full"></div>
            <div class="w-1.5 h-1.5 bg-white/30 rounded-full"></div>
        </div>
    </div>

    <!-- SEÇÃO: SUA BIBLIOTECA -->
    <div class="flex-1 library-container rounded-t-[40px] px-6 pt-8">
        <h2 class="text-3xl font-serif text-brand-gold mb-6 drop-shadow-sm">Sua Biblioteca</h2>
        
        <!-- Grid de E-books (Preenchido via JS) -->
        <div id="books-grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-center py-10 text-gray-500">Carregando biblioteca...</div>
        </div>
    </div>

    <!-- BARRA DE NAVEGAÇÃO INFERIOR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.08)] flex justify-around items-center py-4 px-6 z-50">
        <button class="flex flex-col items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#eab308" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="text-yellow-600 text-[10px] font-bold">Início</span>
        </button>
        <button class="flex flex-col items-center gap-1 opacity-40">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="text-gray-800 text-[10px] font-medium">Buscar</span>
        </button>
        <button class="flex flex-col items-center gap-1 opacity-40">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="text-gray-800 text-[10px] font-medium">Perfil</span>
        </button>
    </nav>

    <!-- ========================================== -->
    <!-- LÓGICA JAVASCRIPT & CONEXÃO SUPABASE       -->
    <!-- ========================================== -->
    <script>
        // 1. Configuração Supabase
        const SUPABASE_URL = 'https://SEU_PROJETO.supabase.co';
        const SUPABASE_ANON_KEY = 'SUA_CHAVE_ANON_AQUI';
        const LOGGED_IN_USER_ID = 'user_123'; // ID do usuário logado

        // 2. Dados Simulados do Banco (Tabela 'books')
        const mockBooksTable = [
            { id: 'livro_1', title: 'TEMPO A DOIS', author: 'Augusto Cury & Max Lucado (Inspiração)', cover: 'https://images.unsplash.com/photo-1515096788709-a3cf4ce0a4a6?auto=format&fit=crop&w=400&q=80' },
            { id: 'livro_2', title: 'MINHA NOVA JORNADA', author: '', cover: 'https://images.unsplash.com/photo-1449034446853-66c86144b0ad?auto=format&fit=crop&w=400&q=80' },
            { id: 'livro_3', title: 'FORÇA INTERIOR', author: '', cover: 'https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=400&q=80' },
            { id: 'livro_4', title: 'O PODER DO HÁBITO', author: '', cover: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=400&q=80' }
        ];

        // 3. Dados Simulados do Banco (Tabela 'user_access')
        // Aqui dizemos que o user_123 comprou apenas o livro_1
        const mockUserAccessTable = [
            { user_id: 'user_123', book_id: 'livro_1' } 
        ];

        // 4. Função Principal de Renderização
        async function loadLibrary() {
            const grid = document.getElementById('books-grid');
            
            // Simula o tempo de resposta da API do Supabase
            setTimeout(() => {
                grid.innerHTML = ''; // Limpa o texto de "Carregando..."

                mockBooksTable.forEach(book => {
                    // LÓGICA DE ACESSO: Verifica se o usuário tem o livro na tabela user_access
                    const hasAccess = mockUserAccessTable.some(
                        access => access.user_id === LOGGED_IN_USER_ID && access.book_id === book.id
                    );

                    // Formata o título para quebrar linhas (ex: "TEMPO<br>A<br>DOIS")
                    const formattedTitle = book.title.split(' ').join('<br>');

                    if (hasAccess) {
                        // GERA CARD: ADQUIRIDO (Com Link)
                        grid.innerHTML += \`
                            <a href="leitor.html?book=\${book.id}" class="block">
                                <div class="bg-brand-dark rounded-2xl p-3 h-64 flex flex-col relative overflow-hidden shadow-lg border border-purple-800/50">
                                    <div class="absolute inset-0 opacity-50">
                                        <img src="\${book.cover}" alt="\${book.title}" class="w-full h-full object-cover">
                                    </div>
                                    <div class="absolute inset-0 bg-gradient-to-t from-brand-dark via-brand-dark/80 to-transparent"></div>
                                    
                                    <div class="relative z-10 flex flex-col h-full">
                                        <h3 class="text-yellow-400 font-serif text-xl text-center mt-2 leading-tight drop-shadow-md">\${formattedTitle}</h3>
                                        
                                        <div class="mt-auto">
                                            <p class="text-white/90 text-[10px] text-center mb-3 leading-tight px-1 font-medium">\${book.author}</p>
                                            <div class="bg-[#1e0a45] border border-yellow-500/30 text-yellow-400 text-[10px] font-bold py-2 px-2 rounded-lg text-center flex items-center justify-center gap-1 shadow-inner">
                                                <span>✓</span> ADQUIRIDO
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        \`;
                    } else {
                        // GERA CARD: BLOQUEADO (Sem Link)
                        grid.innerHTML += \`
                            <div class="bg-gray-200 rounded-2xl p-3 h-64 flex flex-col relative overflow-hidden shadow-sm border border-gray-300">
                                <div class="absolute inset-0 opacity-40 grayscale">
                                    <img src="\${book.cover}" alt="\${book.title}" class="w-full h-full object-cover">
                                </div>
                                <div class="absolute inset-0 bg-gradient-to-t from-gray-200 via-gray-200/80 to-transparent"></div>
                                
                                <div class="relative z-10 flex flex-col h-full items-center justify-center">
                                    <h3 class="text-gray-600 font-serif text-lg text-center mt-2 leading-tight absolute top-4 w-full px-2">\${formattedTitle}</h3>
                                    
                                    <div class="mt-auto mb-4 flex flex-col items-center bg-white/50 px-4 py-2 rounded-xl backdrop-blur-sm">
                                        <!-- Ícone de Cadeado -->
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                        <span class="text-gray-800 text-[10px] font-bold tracking-wider">BLOQUEADO</span>
                                    </div>
                                </div>
                            </div>
                        \`;
                    }
                });
            }, 800);
        }

        // Inicia o carregamento ao abrir a página
        window.onload = loadLibrary;
    </script>
</body>
</html>
